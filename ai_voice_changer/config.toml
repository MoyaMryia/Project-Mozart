# Mozart Post-Process (RVC voice changer backend) configuration

[audio]
input_rate  = 16000
output_rate = 48000
channels    = 1
frame_ms    = 20

[contract]
source          = "mock"          # mock | mozart
ring_name       = "mozart_pre_out"
poll_timeout_us = 5000

[rvc]
assets_dir  = "./assets"
models_dir  = "./models"
hubert_path = "./assets/hubert_base.onnx"
rmvpe_path  = "./assets/rmvpe.onnx"
device      = "cuda"
index_rate  = 0.0
mock_mode   = true

[output]
sink        = "dummy"             # dummy | pipewire
source_name = "rvc_voice_out"

[server]
host = "0.0.0.0"
port = 18080