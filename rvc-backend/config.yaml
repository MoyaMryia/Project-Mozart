# RVC Voice Changer Backend — Configuration
# 定位：接收预处理后的契约流音频，负责 RVC 变声推理
# 预处理（去噪/AEC/AGC/VAD 等）由 Project Mozart 负责，本后端不处理

# ──────────────────────────────────────────────────────────
# 输入契约（来自 Project Mozart 预处理系统）
# 标准契约：16kHz/mono/f32/20ms 帧 + 元数据侧带
# 该契约由 IO/frame_meta.h 固定，不支持运行时修改
# ──────────────────────────────────────────────────────────
input:
  contract:
    sample_rate: 16000        # 标准契约：16kHz（RVC 特征提取直接消费）
    channels: 1
    format: float32           # f32 PCM [-1.0, 1.0]
    frame_duration_ms: 20    # 20ms 帧 = 320 samples @ 16kHz
    bytes_per_sample: 4
  # 元数据侧带（每帧固定 16 字节，见 docs/RVC_BACKEND.md 或 docs/ARCHITECTURE.md）
  meta:
    enabled: true
    pts_enabled: true         # 纳秒级 PTS 时间戳
    vad_enabled: true         # VAD 标记（后处理可跳过静音帧）
    energy_enabled: true      # 能量 dB（后处理参考）
    segment_enabled: true     # 语音段编号
  # 后端是否将输入升采样到 RVC 生成器需要的 48kHz
  # 注意：RVC 特征提取仍用 16kHz，只有生成器输出 48kHz
  # 如果预处理提供 48kHz 变体契约，此设为 false
  upsample_to_rvc_sr: true

# ──────────────────────────────────────────────────────────
# 输出格式（返回给客户端/播放器）
# RVC 生成器输出 48kHz，与声卡原生采样率一致
# ──────────────────────────────────────────────────────────
output:
  sample_rate: 48000
  channels: 1
  format: float32            # 网络传输 float32（与契约一致）
  # 如客户端播放器需要 int16，可在此开启转换
  convert_to_int16: false

# ──────────────────────────────────────────────────────────
# 网络（UDP 音频契约流 + HTTP 控制）
# 音频端口接收预处理后的契约帧，也返回变声后的契约帧
# ──────────────────────────────────────────────────────────
network:
  audio:
    host: "0.0.0.0"
    port: 18000
    # 契约帧时长固定 20ms；后端内部按 20ms 帧做推理
    frame_duration_ms: 20
  control:
    host: "0.0.0.0"
    port: 18080

# ──────────────────────────────────────────────────────────
# RVC 推理配置
# ──────────────────────────────────────────────────────────
rvc:
  # 模型路径（相对项目根目录）
  models_dir: "./models"
  assets_dir: "./assets"

  # 特征提取器（16kHz 输入）
  hubert_path: "./assets/hubert/hubert_base.pt"
  rmvpe_path: "./assets/rmvpe/rmvpe.pt"

  # 推理参数
  sample_rate: 48000          # RVC v2 生成器输出 48kHz
  f0_method: "rmvpe"          # rmvpe / harvest / pm
  pitch_shift: 0              # 变调（半音）
  index_rate: 0.75            # 特征检索比例
  filter_radius: 3
  rms_mix_rate: 0.25
  protect: 0.33

  # 性能
  device: "cuda"              # cuda / cpu
  half: false                 # fp16（Orin Nano 共享内存有限）
  mock_mode: true             # 直通模式（无模型时）

  # 延迟优化：是否将 HuBERT/RMVPE 保持在 GPU 常驻
  keep_feature_extractor_warm: true

# ──────────────────────────────────────────────────────────
# 日志
# ──────────────────────────────────────────────────────────
logging:
  level: INFO
  print_latency_stats: true
  latency_stats_interval_sec: 5
